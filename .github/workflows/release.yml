name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    name: Draft release PR + tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4.4.1
        id: release
        with:
          release-type: node
          target-branch: main

      - name: Checkout (for release build)
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Bun
        if: steps.release.outputs.release_created == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.release.outputs.release_created == 'true'
        run: bun install --frozen-lockfile

      - name: Build for release
        if: steps.release.outputs.release_created == 'true'
        run: bun run build

      - name: Attach dist to GitHub release
        if: steps.release.outputs.release_created == 'true'
        run: |
          tar -czf dist.tar.gz dist
          gh release upload ${{ steps.release.outputs.tag_name }} dist.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
